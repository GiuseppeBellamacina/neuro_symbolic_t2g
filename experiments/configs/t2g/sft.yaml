# ============================================================================
# SFT Training Config — Qwen2.5-0.5B-Instruct — Text-to-Gloss (T2G)
#
# Supervised Fine-Tuning baseline per confronto con GRPO nel ablation study.
# L'SFT addestra il modello via teacher forcing sulle gloss di riferimento,
# senza reward shaping né constrained decoding durante il training.
#
# Usato da:
#   CONFIG=experiments/configs/t2g/sft.yaml sbatch cluster/train.sh
#   python -m src.training.sft_train --config experiments/configs/t2g/sft.yaml
# ============================================================================

# --- Modello ---
model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  num_gpus: 1
  quantization: "4bit"
  dtype: "bfloat16"
  use_unsloth: true
  max_seq_length: 1024

# --- LoRA adapters ---
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  random_state: 3407

# --- Dataset ---
dataset:
  dataset_name: "achrafothman/aslg_pc12"
  dataset_cache: "data/aslg_pc12"
  vocab_path: "data/gloss_vocab.txt"
  bigram_matrix_path: "data/bigram_transition.npy"
  split: "train"
  max_samples: null
  seed: 42
  thinking: false

# --- Iperparametri di training SFT ---
training:
  trainer: sft  # Auto-detection key for __main__.py bootstrap
  # SFT usa epoche invece di max_steps (supervised, non RL)
  num_train_epochs: 3
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2.0e-5
  lr_scheduler_type: "cosine"
  warmup_steps: 100
  optim: "paged_adamw_8bit"
  weight_decay: 0.1
  max_grad_norm: 1.0
  bf16: true
  logging_steps: 10
  save_steps: 200
  save_total_limit: 3
  max_seq_length: 768
  output_dir: "experiments/checkpoints/sft/t2g/qwen25-05b"
  log_dir: "experiments/logs/sft/t2g/qwen25-05b"

# --- Parametri di generazione (eval-only: usati da eval_t2g.py) ---
generation:
  max_completion_length: 256
  max_prompt_length: 256
  temperature: 0.7

# --- Pesi della reward function (eval-only per SFT) ---
reward:
  # Translation quality (ROUGE-L similarity with gold gloss)
  weight_translation: 0.40
  # Gold-structure reward: bigram score vs gold reference baseline
  weight_gold_structure: 0.40
  # Format reward: ensure gloss tokens only (no free text)
  weight_format: 0.10
  # Repetition penalty
  weight_repetition: 0.10

# --- Constrained Decoding ---
grammar:
  enabled: true
  use_grammarllm_pda: false
  # Viterbi diversity penalty params (for viterbi_distance_reward eval)
  viterbi_diversity:
    self_loop_penalty: 0.5
    max_occurrences: 2
    diversity_threshold: 0.3
    max_iters: 3

# --- Curriculum Learning (disabled) ---
curriculum:
  enabled: false

# --- Evaluation ---
evaluation:
  batch_size: 8

# --- Weights & Biases ---
wandb:
  project: "neuro-symbolic-t2g"
  run_name: "ablation-sft-baseline"
  tags: ["ablation", "SFT", "supervised", "T2G", "Qwen2.5-0.5B", "ASL"]
