# ============================================================================
# Ablation Study — GRPO + GrammarLLM PDA (Full LL(1) Constrained Decoding)
#
# Esegue training GRPO CON constrained decoding via Pushdown Automaton.
# A differenza del default (vocabulary mask), questo usa il PDA completo
# di grammarllm per vincoli grammaticali LL(1).
#
# Usato da:
#   CONFIG=experiments/configs/t2g/ablation/grpo_pda.yaml sbatch cluster/train.sh
# ============================================================================

# --- Modello ---
model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  num_gpus: 1
  quantization: "4bit"
  dtype: "bfloat16"
  use_unsloth: true
  max_seq_length: 1024

# --- LoRA adapters ---
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  random_state: 3407

# --- Dataset ---
dataset:
  dataset_name: "achrafothman/aslg_pc12"
  dataset_cache: "data/aslg_pc12"
  vocab_path: "data/gloss_vocab.txt"
  bigram_matrix_path: "data/bigram_transition.npy"
  split: "train"
  max_samples: null
  seed: 42
  thinking: false

# --- Constrained Decoding (PDA mode) ---
grammar:
  enabled: true
  # Ablation: full LL(1) grammar via Pushdown Automaton
  use_grammarllm_pda: true
  token_lookahead: false      # grammarllm v0.5.0: native BPE token emission (only with use_grammarllm_pda: true)
  track_score_history: false  # grammarllm v0.5.0: accumulate per-step logit history for debug (memory cost)
  # Temperature for PDA logit scaling
  pda_temperature: 1.0
  # Viterbi diversity penalty params (for viterbi_distance_reward)
  viterbi_diversity:
    self_loop_penalty: 0.5
    max_occurrences: 2
    diversity_threshold: 0.3
    max_iters: 3
    verifier_gamma: 1.0
    # Verifier temperature: scala avg_log_prob prima del sigmoid/softmax in
    # structural_dense_reward. Disaccoppiato da verifier_gamma.
    verifier_temperature: 5.0

# --- Iperparametri di training ---
training:
  max_steps: 1500
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_steps: 150 # was warmup_ratio: 0.1 → deprecated in transformers 5.2+
  optim: "paged_adamw_8bit"
  weight_decay: 0.1
  max_grad_norm: 0.1
  bf16: true
  gradient_checkpointing: true # OOM mitigation (forward activations recomputed in backward)
  logging_steps: 5
  save_steps: 100
  save_total_limit: 3
  output_dir: "experiments/checkpoints/qwen25-05b-pda"
  log_dir: "experiments/logs/qwen25-05b-pda"

# --- Parametri GRPO ---
grpo:
  num_generations: 4
  max_completion_length: 256
  max_prompt_length: 256
  beta: 0.04
  temperature: 0.7

# --- Pesi della reward function ---
reward:
  weight_translation: 0.30
  weight_gold_structure: 0.35
  weight_gloss_order: 0.15
  weight_format: 0.10
  weight_repetition: 0.10

# --- Curriculum Learning (disabled) ---
curriculum:
  enabled: false

# --- Evaluation ---
evaluation:
  batch_size: 8
  max_samples: 500
  num_samples: 5
  best_of_n: false

# --- Weights & Biases ---
wandb:
  project: "neuro-symbolic-t2g"
  run_name: "ablation-grpo-pda"
  tags:
    [
      "ablation",
      "GRPO",
      "grammarllm",
      "PDA",
      "LL1",
      "T2G",
      "Qwen2.5-0.5B",
      "ASL",
    ]
