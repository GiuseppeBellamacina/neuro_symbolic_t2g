# ============================================================================
# Ablation Config — GRPO + Full PDA + Token-Boundary Lookahead
#
# Sfrutta le nuove capacità di grammarllm v0.5.0:
#   - use_grammarllm_pda: true  →  path PDA completo (LL(1) parsing)
#   - token_lookahead: true     →  il modello emette token BPE nativi che
#                                   attraversano i boundary grammaticali
#                                   (es. "DESC-NUMEROUS" come singolo BPE
#                                   invece di spelling ["DESC","-","NUMEROUS"])
#   - StatelessLogitsProcessor    →  cache LRU + re-simulation (beam-safe)
#
# Differenze da grpo_optimal.yaml:
#   - grammar.use_grammarllm_pda: true (era false → Trie dual-root)
#   - grammar.token_lookahead: true (NUOVO, default v0.5.0)
#   - grpo.num_generations: 8 (come optimal, dopo fix OOM)
#
# Ipotesi ablation:
#   Il token-boundary lookahead dovrebbe migliorare la qualità della
#   generazione permettendo al modello Qwen2.5 (BPE) di usare la sua
#   tokenizzazione nativa di pre-training invece di essere forzato a
#   spelling character-by-character dal Trie. Confrontare con
#   grpo_optimal.yaml (Trie dual-root) per misurare il delta.
#
# Uso:
#   CONFIG=experiments/configs/t2g/ablation/grpo_pda_lookahead.yaml sbatch cluster/run_all.sh
#   python -m src.training --config experiments/configs/t2g/ablation/grpo_pda_lookahead.yaml
# ============================================================================

# --- Modello ---
model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  num_gpus: 1
  quantization: "4bit"
  dtype: "bfloat16"
  use_unsloth: true
  max_seq_length: 1024

# --- LoRA adapters ---
# r=32 come optimal per maggiore capacità
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  random_state: 3407

# --- Dataset ---
dataset:
  dataset_name: "achrafothman/aslg_pc12"
  dataset_cache: "data/aslg_pc12"
  vocab_path: "data/gloss_vocab.txt"
  bigram_matrix_path: "data/bigram_transition.npy"
  split: "train"
  max_samples: null
  seed: 42
  thinking: false

# --- SFT Pre-training (Phase 0) ---
sft_pretrain:
  enabled: true
  training:
    num_train_epochs: 1
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    learning_rate: 2.0e-5
    lr_scheduler_type: "cosine"
    warmup_steps: 50
    optim: "paged_adamw_8bit"
    weight_decay: 0.1
    max_grad_norm: 1.0
    bf16: true
    logging_steps: 10
    save_steps: 200
    save_total_limit: 1
    max_seq_length: 768
    gradient_checkpointing: true

# --- Iperparametri di training GRPO ---
# Allineati a grpo_optimal.yaml (post-fix OOM): G=8, gradient_checkpointing=true
training:
  max_steps: 2000
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-6
  lr_scheduler_type: "cosine"
  warmup_steps: 200
  optim: "paged_adamw_8bit"
  weight_decay: 0.1
  max_grad_norm: 0.05
  bf16: true
  gradient_checkpointing: true
  logging_steps: 5
  save_steps: 100
  save_total_limit: 3
  output_dir: "experiments/checkpoints/qwen25-05b-pda-lookahead"
  log_dir: "experiments/logs/qwen25-05b-pda-lookahead"

# --- Parametri GRPO ---
# G=8 (post-fix OOM, provato sul cluster 22GB)
grpo:
  num_generations: 8
  max_completion_length: 128
  max_prompt_length: 256
  beta: 0.0
  temperature: 0.9

# --- Pesi della reward function (allineati a optimal v2.1) ---
reward:
  weight_translation: 0.20
  weight_bleu: 0.20
  weight_gold_structure: 0.20
  weight_gloss_order: 0.10
  weight_verifier_scaled: 0.10
  weight_format: 0.10
  weight_repetition: 0.10

# --- Constrained Decoding ---
# ⭐ KEY DIFFERENCE: PDA completo + token-boundary lookahead (grammarllm v0.5.0)
grammar:
  enabled: true
  use_grammarllm_pda: true   # ← era false (Trie dual-root) in optimal
  token_lookahead: true       # ← NUOVO: native BPE token emission
  track_score_history: false  # set true per debug (costa 1 tensor/step)
  viterbi_diversity:
    self_loop_penalty: 0.5
    max_occurrences: 2
    diversity_threshold: 0.3
    max_iters: 3
    verifier_gamma: 1.5
    verifier_temperature: 5.0

# --- Curriculum Learning ---
curriculum:
  enabled: true

# --- Evaluation ---
evaluation:
  batch_size: 8
  max_samples: 500
  num_samples: 5
  best_of_n: true

# --- Weights & Biases ---
wandb:
  project: "neuro-symbolic-t2g"
  run_name: "ablation-grpo-pda-lookahead"
  tags:
    [
      "ablation",
      "grpo",
      "pda",
      "lookahead",
      "token-boundary",
      "grammarllm-v050",
      "T2G",
      "constrained-decoding",
      "Qwen2.5-0.5B",
      "ASL",
    ]
