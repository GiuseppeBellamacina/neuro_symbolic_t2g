# ============================================================================
# Ablation Study — GRPO WITHOUT Grammar (GRPO No Grammar)
#
# Esegue training GRPO standard SENZA constrained decoding.
# Il modello genera liberamente (nessun vocabulary mask).
# Le reward sono le stesse del training standard (ROUGE-L + structure + format + repetition).
#
# Usato da:
#   CONFIG=experiments/configs/t2g/ablation/grpo_no_grammar.yaml sbatch cluster/train.sh
#   python -m src.training --config experiments/configs/t2g/ablation/grpo_no_grammar.yaml
# ============================================================================

# --- Modello ---
model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  num_gpus: 1
  quantization: "4bit"
  dtype: "bfloat16"
  use_unsloth: true
  max_seq_length: 1024

# --- LoRA adapters ---
lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  random_state: 3407

# --- Dataset ---
dataset:
  dataset_name: "achrafothman/aslg_pc12"
  dataset_cache: "data/aslg_pc12"
  vocab_path: "data/gloss_vocab.txt"
  bigram_matrix_path: "data/bigram_transition.npy"
  split: "train"
  max_samples: null
  seed: 42
  thinking: false

# --- Grammar DISABLED for ablation ---
grammar:
  enabled: false
  # Viterbi diversity penalty params (for viterbi_distance_reward eval)
  viterbi_diversity:
    self_loop_penalty: 0.5
    max_occurrences: 2
    diversity_threshold: 0.3
    max_iters: 3

# --- Iperparametri di training ---
training:
  max_steps: 1500
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 5.0e-6
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.1
  optim: "paged_adamw_8bit"
  weight_decay: 0.1
  max_grad_norm: 0.1
  bf16: true
  logging_steps: 5
  save_steps: 100
  save_total_limit: 3
  output_dir: "experiments/checkpoints/grpo/t2g/qwen25-05b-no-grammar"
  log_dir: "experiments/logs/grpo/t2g/qwen25-05b-no-grammar"

# --- Parametri GRPO ---
grpo:
  num_generations: 4
  max_completion_length: 256
  max_prompt_length: 256
  beta: 0.04
  temperature: 0.7

# --- Pesi della reward function ---
reward:
  weight_translation: 0.40
  weight_gold_structure: 0.40
  weight_format: 0.10
  weight_repetition: 0.10

# --- Curriculum Learning (disabled) ---
curriculum:
  enabled: false

# --- Evaluation ---
evaluation:
  batch_size: 8

# --- Weights & Biases ---
wandb:
  project: "neuro-symbolic-t2g"
  run_name: "ablation-grpo-no-grammar"
  tags: ["ablation", "GRPO", "no-grammar", "T2G", "Qwen2.5-0.5B", "ASL"]
