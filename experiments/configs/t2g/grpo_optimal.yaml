# ============================================================================
# OPTIMAL Config — GRPO + Constrained Decoding + Paper-Inspired Rewards
#
# Config ottimale per ottenere i migliori risultati su ASLG-PC12 T2G.
# Combina:
#   - SFT pre-training (Phase 0: impara il formato gloss)
#   - GRPO con reward ottimizzate (translation + gold_structure + verifier)
#   - Constrained decoding con Trie dual-root (no garbage tokens)
#   - Viterbi diversity params ottimizzati
#   - Evaluation completa con bootstrap CI
#
# Pipeline:
#   1. SFT pre-training (1 epoch, impara formato gloss)
#   2. GRPO training (2000 step, reward shaping)
#   3. Evaluation (ROUGE-L, BLEU, Pass@1, Pass@k, reward breakdown, CI 95%)
#
# Uso:
#   # Train + Eval (catena automatica):
#   CONFIG=experiments/configs/t2g/grpo_optimal.yaml sbatch cluster/run_all.sh
#
#   # Solo training:
#   CONFIG=experiments/configs/t2g/grpo_optimal.yaml sbatch cluster/train.sh
#
#   # Solo evaluation:
#   CONFIG=experiments/configs/t2g/grpo_optimal.yaml sbatch cluster/eval.sh
#
#   # Locale (senza cluster):
#   python -m src.training --config experiments/configs/t2g/grpo_optimal.yaml
#   python -m src.training.eval_t2g --config experiments/configs/t2g/grpo_optimal.yaml --checkpoint experiments/checkpoints/grpo/t2g/qwen25-05b-optimal/final --plot
# ============================================================================

# --- Modello ---
model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  num_gpus: 1
  quantization: "4bit"
  dtype: "bfloat16"
  use_unsloth: true
  max_seq_length: 1024

# --- LoRA adapters ---
# r=32 (doppio rispetto al default r=16) per maggiore capacità di adattamento.
# lora_alpha=64 (2x di r, come raccomandato dalla letteratura LoRA).
lora:
  r: 32
  lora_alpha: 64
  lora_dropout: 0.05 # leggero dropout per regolarizzazione
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  task_type: "CAUSAL_LM"
  random_state: 3407

# --- Dataset ---
dataset:
  dataset_name: "achrafothman/aslg_pc12"
  dataset_cache: "data/aslg_pc12"
  vocab_path: "data/gloss_vocab.txt"
  bigram_matrix_path: "data/bigram_transition.npy"
  split: "train"
  max_samples: null # usa tutto il dataset (78939 samples)
  seed: 42
  thinking: false

# --- SFT Pre-training (Phase 0) ---
# SFT insegna al modello il formato gloss prima del GRPO.
# Senza SFT, il modello genera free text e GRPO impiega più step a convergere.
sft_pretrain:
  enabled: true
  training:
    num_train_epochs: 1
    per_device_train_batch_size: 4
    gradient_accumulation_steps: 4
    learning_rate: 2.0e-5
    lr_scheduler_type: "cosine"
    warmup_steps: 50
    optim: "paged_adamw_8bit"
    weight_decay: 0.1
    max_grad_norm: 1.0
    bf16: true
    logging_steps: 10
    save_steps: 200
    save_total_limit: 1
    max_seq_length: 768
    gradient_checkpointing: true

# --- Iperparametri di training GRPO ---
# max_steps=2000 (più lungo del default 1500 per migliore convergenza)
# learning_rate=3e-6 (leggermente più basso per stabilità con LoRA r=32)
# max_grad_norm=0.05 (più stretto per stabilità GRPO)
training:
  max_steps: 2000
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-6
  lr_scheduler_type: "cosine"
  warmup_steps: 200 # più lungo warmup per stabilità
  optim: "paged_adamw_8bit"
  weight_decay: 0.1
  max_grad_norm: 0.05
  bf16: true
  logging_steps: 5
  save_steps: 100
  save_total_limit: 3
  output_dir: "experiments/checkpoints/qwen25-05b-optimal"
  log_dir: "experiments/logs/qwen25-05b-optimal"

# --- Parametri GRPO ---
# num_generations=8 (più alto del default 4 per migliore stima del vantaggio)
# max_completion_length=128 (sufficiente per gloss ASL, ~20-40 token)
# beta=0.02 (KL penalty più basso per permettere più esplorazione)
# temperature=0.8 (leggermente più alta per diversità nei rollout)
grpo:
  num_generations: 8
  max_completion_length: 128
  max_prompt_length: 256
  beta: 0.02
  temperature: 0.8

# --- Pesi della reward function (OTTIMIZZATO) ---
# Combinazione ottimale basata su esperimenti e paper:
#   - translation (ROUGE-L): segnale semantico primario
#   - gold_structure: plausibilità strutturale vs gold reference
#   - gloss_order: edit-distance per sensibilità all'ordine
#   - verifier_scaled: RECIPE-inspired confidence gate (arXiv:2605.19976)
#   - format: penalizza free text
#   - repetition: penalizza loop degeneri
reward:
  # Translation quality (ROUGE-L similarity with gold gloss)
  weight_translation: 0.25
  # Gold-structure reward: bigram score vs gold reference baseline
  weight_gold_structure: 0.25
  # Gloss-order reward: word-level edit-distance vs gold gloss
  weight_gloss_order: 0.15
  # Verifier-scaled reward (RECIPE-inspired, arXiv:2605.19976):
  # usa structural plausibility come confidence multiplier per ROUGE-L.
  # Più informativo di translation o structure da soli.
  weight_verifier_scaled: 0.15
  # Format reward: ensure gloss tokens only (no free text)
  weight_format: 0.10
  # Repetition penalty
  weight_repetition: 0.10

  # ── Ablation modules (decommenta per testare) ──────────────────────
  # Soft Viterbi (differentiable, forward-backward) — ViterbiPlanNet DVL
  # weight_soft_viterbi: 0.0
  # Hard Viterbi distance (experimental, non-differentiable)
  # weight_viterbi: 0.0
  # Absolute bigram score (no baseline — use gold_structure instead)
  # weight_structure: 0.0

# --- Constrained Decoding ---
grammar:
  enabled: true
  use_grammarllm_pda: false # Trie dual-root è più veloce e sufficiente
  # Viterbi diversity penalty params (for viterbi_distance_reward)
  viterbi_diversity:
    self_loop_penalty: 0.5
    max_occurrences: 2
    diversity_threshold: 0.3
    max_iters: 3
    # Verifier gamma: controlla la strictness del structural gate.
    # gamma=1.5 = leggermente più stricto del lineare (buon bilanciamento)
    verifier_gamma: 1.5
    # Verifier temperature: scala avg_log_prob prima del sigmoid/softmax in
    # structural_dense_reward (usato da verifier_scaled_reward). Disaccoppiato
    # da verifier_gamma — NON riusare gamma come temperature, altrimenti il
    # reward collassa quasi a 0 per sequenze a bassa probabilità (stesso bug
    # di prima). temperature=5.0 = curva morbida raccomandata.
    verifier_temperature: 5.0

# --- Curriculum Learning (disabled — GRPO gestisce da solo) ---
curriculum:
  enabled: false

# --- Evaluation ---
# max_samples=null per valutare su tutto il test set (8771 samples)
# batch_size=8 per generazione batched
evaluation:
  batch_size: 8
  max_samples: 500 # 500 campioni per evaluation rapida, null per tutto il test set
  num_samples: 5 # 5 completions per prompt per Pass@k
  # Best-of-N selection: seleziona il miglior completamento per prompt
  # (ROUGE-L più alto tra i validi). Aiuta il modello piccolo a generalizzare.
  # Attivato anche via CLI con --best-of-n.
  best_of_n: true # true per attivare di default, o usa --best-of-n

# --- Weights & Biases ---
wandb:
  project: "neuro-symbolic-t2g"
  run_name: "grpo-t2g-optimal"
  tags:
    [
      "grpo",
      "T2G",
      "constrained-decoding",
      "optimal",
      "verifier-scaled",
      "RECIPE",
      "Qwen2.5-0.5B",
      "ASL",
    ]
